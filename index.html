<!DOCTYPE html>
<html>
<head>
    <title>PPE Monitoring Dashboard</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #0b1220;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #38bdf8;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .site {
            color: #38bdf8;
            font-size: 18px;
            font-weight: bold;
        }

        .risk-high {
            color: red;
            font-weight: bold;
        }

        .risk-low {
            color: lightgreen;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 5px;
            background: #334155;
            display: inline-block;
            margin-top: 5px;
        }

        .header-bar {
            background: #111827;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="header-bar">
    🦺 PPE Safety Monitoring System (Live Dashboard)
</div>

<h1>Real-Time Violations</h1>

<div class="container">

{% for item in data %}

<div class="card">

    <div class="site">🏗 {{ item.site }}</div>

    <p>⚠ Violation: <span class="badge">{{ item.violation }}</span></p>

    <p>
        📊 Risk:
        {% if item.risk >= 50 %}
            <span class="risk-high">{{ item.risk }}</span>
        {% else %}
            <span class="risk-low">{{ item.risk }}</span>
        {% endif %}
    </p>

    <p>⏰ {{ item.time }}</p>

</div>

{% endfor %}

</div>

</body>
</html>
